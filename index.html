<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Hours Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');

:root {
  --bg: #f5f4f0;
  --white: #ffffff;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --green: #06d6a0;
  --amber: #ffd166;
  --border: #e0ddd6;
  --text: #2d2d2d;
  --text2: #888;
  --radius: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOGIN */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: var(--dark);
  background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 41px),
                    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 41px);
}
.login-box {
  background: #fff; border-radius:16px; padding:40px 36px; width:380px;
  box-shadow:0 32px 80px rgba(0,0,0,0.4);
}
.login-logo { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--dark); margin-bottom:4px; }
.login-logo span { color:var(--accent); }
.login-sub { font-size:12px; color:var(--text2); margin-bottom:28px; letter-spacing:.5px; text-transform:uppercase; }
.login-roles { display:flex; gap:8px; margin-bottom:20px; }
.role-btn {
  flex:1; padding:10px; border-radius:8px; border:1.5px solid var(--border);
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  transition:all .15s; background:transparent; color:var(--text2);
}
.role-btn.active { border-color:var(--accent); background:#fff0f3; color:var(--accent); }
.fi { margin-bottom:14px; }
.fi label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); margin-bottom:5px; }
.fi input, .fi select {
  width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text);
  background:#fff; outline:none; transition:border-color .2s;
}
.fi input:focus, .fi select:focus { border-color:var(--accent); }
.btn-login {
  width:100%; padding:12px; background:var(--dark); color:#fff; border:none;
  border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; transition:background .15s; margin-top:4px;
}
.btn-login:hover { background:var(--accent); }
.login-hint { font-size:11px; color:var(--text2); text-align:center; margin-top:12px; }

/* MAIN APP */
#mainApp { display:none; min-height:100vh; }

/* TOPBAR */
.topbar {
  background:var(--dark); height:56px; display:flex; align-items:center;
  padding:0 24px; gap:16px; position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.25);
}
.topbar-logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:#fff; }
.topbar-logo span { color:var(--accent); }
.topbar-user {
  margin-left:auto; display:flex; align-items:center; gap:8px;
  font-size:12px; color:rgba(255,255,255,0.55);
}
.topbar-user strong { color:#fff; font-size:13px; }
.btn-signout {
  padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.15);
  background:transparent; color:rgba(255,255,255,0.6); font-size:12px;
  cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif;
}
.btn-signout:hover { background:rgba(255,255,255,0.08); color:#fff; }

/* NAV TABS */
.nav-tabs { background:#fff; border-bottom:1px solid var(--border); display:flex; padding:0 24px; gap:2px; }
.ntab {
  padding:12px 18px; font-size:13px; font-weight:500; color:var(--text2);
  cursor:pointer; border-bottom:2px solid transparent; transition:all .15s;
  white-space:nowrap;
}
.ntab:hover { color:var(--text); }
.ntab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

/* CONTENT */
.content { padding:28px; max-width:1200px; margin:0 auto; }

/* PAGE */
.page { display:none; }
.page.active { display:block; }

/* PAGE HEADER */
.ph { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px; }
.ph-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--dark); }
.ph-sub { font-size:12px; color:var(--text2); margin-top:2px; }

/* CARD */
.card {
  background:#fff; border-radius:var(--radius); border:1px solid var(--border);
  box-shadow:var(--shadow); padding:20px; margin-bottom:20px;
}
.card-title {
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase;
  letter-spacing:.6px; color:var(--dark); margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:7px; border:none;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s;
}
.btn-primary { background:var(--dark); color:#fff; }
.btn-primary:hover { background:var(--accent); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:#c73652; }
.btn-green { background:#06d6a0; color:#fff; }
.btn-green:hover { background:#05b888; }
.btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--text); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:#fee2e2; border:1px solid #fca5a5; color:#dc2626; }
.btn-danger:hover { background:#dc2626; color:#fff; }
.btn-sm { padding:5px 11px; font-size:11px; }
.btn-xs { padding:3px 8px; font-size:10px; }

/* FORM */
.form-row { display:flex; gap:12px; flex-wrap:wrap; }
.form-row .fg { flex:1; min-width:140px; }
.fg { margin-bottom:14px; }
.fg label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); margin-bottom:5px; }
.fg input, .fg select, .fg textarea {
  width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:7px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text);
  background:#fff; outline:none; transition:border-color .2s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--accent); }

/* TABLE */
.tbl-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; }
th {
  padding:10px 14px; text-align:left; background:var(--dark); color:#fff;
  font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.6px; white-space:nowrap;
}
td { padding:9px 14px; border-bottom:1px solid #f0ede8; color:var(--text); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafaf8; }
.td-actions { display:flex; gap:6px; }

/* PILLS */
.pill {
  display:inline-flex; align-items:center; padding:2px 9px; border-radius:10px;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
}
.pill-A { background:#fef3c7; color:#92400e; }
.pill-B { background:#dcfce7; color:#166534; }
.pill-C { background:#dbeafe; color:#1e40af; }
.pill-D { background:#fce7f3; color:#9d174d; }
.pill-E { background:#ede9fe; color:#5b21b6; }
.pill-nrw { background:#e0f2fe; color:#0369a1; }
.pill-wup { background:#fdf4ff; color:#7e22ce; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:22px; }
.stat-box { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); }
.stat-val { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--dark); }
.stat-lbl { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); font-weight:600; margin-top:2px; }
.stat-sub { font-size:11px; color:var(--accent); font-weight:600; margin-top:3px; }

/* ALERT */
.alert { padding:10px 14px; border-radius:7px; font-size:13px; display:none; align-items:center; gap:8px; margin-bottom:14px; }
.alert.show { display:flex; }
.alert-green { background:#dcfce7; border:1px solid #86efac; color:#166534; }
.alert-red { background:#fee2e2; border:1px solid #fca5a5; color:#dc2626; }

/* MODAL */
.modal-bg {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px); z-index:200; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:#fff; border-radius:14px; padding:28px; width:460px; max-width:92vw;
  box-shadow:0 24px 60px rgba(0,0,0,0.25); animation:mIn .18s ease;
}
@keyframes mIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }
.modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:18px; color:var(--dark); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }

/* TOUR VALUE EDITOR */
.tour-editor { display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:10px; }
.te-box {
  border:1.5px solid var(--border); border-radius:8px; padding:12px 10px;
  text-align:center;
}
.te-box .te-label { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--dark); margin-bottom:6px; }
.te-box input {
  width:100%; padding:6px 8px; border:1.5px solid var(--border); border-radius:6px;
  font-size:14px; font-weight:700; text-align:center; font-family:'DM Sans',sans-serif;
  outline:none; color:var(--text);
}
.te-box input:focus { border-color:var(--accent); }
.te-box .te-unit { font-size:10px; color:var(--text2); margin-top:4px; text-transform:uppercase; letter-spacing:.5px; }

/* HOURS REPORT */
.report-driver { border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
.rd-header {
  display:flex; align-items:center; padding:12px 16px; background:#f8f7f4;
  cursor:pointer; gap:12px;
}
.rd-name { font-weight:700; font-size:14px; color:var(--dark); flex:1; }
.rd-hours { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--accent); }
.rd-lbl { font-size:10px; color:var(--text2); text-transform:uppercase; }
.rd-body { padding:12px 16px; display:none; }
.rd-body.open { display:block; }
.tour-breakdown { display:flex; gap:8px; flex-wrap:wrap; }
.tb-chip {
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
  display:flex; align-items:center; gap:5px;
}

/* MONTH TOTAL */
.month-total-box {
  background:var(--dark); color:#fff; border-radius:var(--radius);
  padding:20px 24px; display:flex; align-items:center; gap:24px; flex-wrap:wrap;
}
.mt-label { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:rgba(255,255,255,.5); margin-bottom:4px; }
.mt-val { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; color:#fff; }
.mt-sub { font-size:11px; color:rgba(255,255,255,.4); margin-top:2px; }

/* FILTER BAR */
.filter-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:18px; }
.filter-bar .fg { margin-bottom:0; }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }

/* LIST EDITOR */
.list-items { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; max-height:220px; overflow-y:auto; }
.li-row {
  display:flex; align-items:center; gap:8px; padding:8px 12px;
  border:1px solid var(--border); border-radius:7px; background:#fafaf8;
}
.li-name { flex:1; font-size:13px; font-weight:500; }
.add-row { display:flex; gap:8px; }
.add-row input {
  flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:7px;
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
}
.add-row input:focus { border-color:var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Tour<span>Track</span></div>
    <div class="login-sub">Driver Hours Management</div>
    <div class="login-roles">
      <button class="role-btn active" onclick="setRole('user')" id="rl-user">👤 Driver Portal</button>
      <button class="role-btn" onclick="setRole('admin')" id="rl-admin">⚙️ Admin Portal</button>
    </div>
    <div class="fi">
      <label>Your Name</label>
      <input id="loginName" placeholder="Enter your name" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fi" id="passGroup" style="display:none">
      <label>Admin Password</label>
      <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="alert alert-red" id="loginAlert">Incorrect password.</div>
    <button class="btn-login" onclick="doLogin()">Sign In →</button>
    <div class="login-hint">Admin password: <strong>admin2024</strong></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">Tour<span>Track</span></div>
    <div class="topbar-user">
      Signed in as &nbsp;<strong id="topbarName">—</strong>
      &nbsp;·&nbsp;
      <span id="topbarRole" style="color:var(--accent);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px"></span>
    </div>
    <button class="btn-signout" onclick="logout()">Sign Out</button>
  </div>

  <div class="nav-tabs" id="navTabs"></div>

  <div class="content" id="appContent"></div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <div class="modal-title" id="entryModalTitle">Add Entry</div>
    <div class="form-row">
      <div class="fg">
        <label>Driver</label>
        <select id="eDriver"></select>
      </div>
      <div class="fg">
        <label>Date</label>
        <input type="date" id="eDate">
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label>Tour</label>
        <select id="eTour"></select>
      </div>
      <div class="fg">
        <label>Station</label>
        <select id="eStation"></select>
      </div>
    </div>
    <div class="alert alert-green" id="entryAlert"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('entryModal')">Cancel</button>
      <button class="btn btn-primary" id="entrySaveBtn" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <div class="modal-title">🗑 Confirm Delete</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px" id="delMsg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delModal')">Cancel</button>
      <button class="btn btn-danger" id="delConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA — localStorage backed
// ============================================================
const ADMIN_PASS = 'admin2024';

function loadData() {
  try { return JSON.parse(localStorage.getItem('tourtrack') || 'null') || defaultData(); }
  catch(e) { return defaultData(); }
}
function saveData() { localStorage.setItem('tourtrack', JSON.stringify(db)); }
function defaultData() {
  return {
    drivers: ['Ahmed Al-Rashid','Maria Schmidt','Klaus Weber','Fatima Hassan','John Müller'],
    stations: ['NRW','Wuppertal'],
    tours: ['A','B','C','D','E'],
    tourValues: { A:8, B:7.5, C:6, D:9, E:5 },
    entries: []
  };
}

let db = loadData();
let currentUser = null;
let currentRole = null;
let loginRole = 'user';
let editingEntryId = null;

// ============================================================
// LOGIN
// ============================================================
function setRole(r) {
  loginRole = r;
  document.getElementById('rl-user').classList.toggle('active', r==='user');
  document.getElementById('rl-admin').classList.toggle('active', r==='admin');
  document.getElementById('passGroup').style.display = r==='admin' ? '' : 'none';
}

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginAlert').classList.remove('show');
  if (!name) { document.getElementById('loginName').focus(); return; }
  if (loginRole === 'admin') {
    if (pass !== ADMIN_PASS) { document.getElementById('loginAlert').classList.add('show'); return; }
    currentRole = 'admin'; currentUser = name;
  } else {
    currentRole = 'user'; currentUser = name;
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('topbarName').textContent = currentUser;
  document.getElementById('topbarRole').textContent = currentRole === 'admin' ? 'Admin' : 'Driver';
  buildApp();
}

function logout() {
  currentUser = null; currentRole = null; editingEntryId = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
  setRole('user');
}

// ============================================================
// APP BUILDER
// ============================================================
function buildApp() {
  if (currentRole === 'user') buildUserApp();
  else buildAdminApp();
}

// -------- USER APP --------
function buildUserApp() {
  document.getElementById('navTabs').innerHTML = `
    <div class="ntab active" onclick="uNav('entries')" id="ut-entries">📋 My Entries</div>
    <div class="ntab" onclick="uNav('hours')" id="ut-hours">⏱ Hours Report</div>
  `;
  uNav('entries');
}

let uPage = 'entries';
function uNav(p) {
  uPage = p;
  ['entries','hours'].forEach(x => {
    const el = document.getElementById('ut-'+x);
    if (el) el.classList.toggle('active', x===p);
  });
  if (p==='entries') renderUserEntries();
  else renderHoursReport();
}

function renderUserEntries() {
  const c = document.getElementById('appContent');
  c.innerHTML = `
    <div class="ph">
      <div><div class="ph-title">My Tour Entries</div><div class="ph-sub">Add and manage your daily tour records</div></div>
      <button class="btn btn-primary" onclick="openEntryModal()">+ Add Entry</button>
    </div>
    <div class="card">
      <div class="filter-bar">
        <div class="fg"><label>Filter by Month</label><input type="month" id="filterMonth" onchange="renderUserEntries()"></div>
        <div class="fg"><label>Filter by Station</label>
          <select id="filterStation" onchange="renderUserEntries()">
            <option value="">All Stations</option>
            ${db.stations.map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filterMonth').value='';document.getElementById('filterStation').value='';renderUserEntries()">Clear</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th>Date</th><th>Driver</th><th>Tour</th><th>Hours</th><th>Station</th><th>Actions</th></tr></thead>
          <tbody id="entriesBody"></tbody>
        </table>
      </div>
    </div>
  `;
  populateEntriesTable('entriesBody', false);
}

function populateEntriesTable(tbodyId, allDrivers) {
  const tbody = document.getElementById(tbodyId);
  const month = document.getElementById('filterMonth')?.value || '';
  const station = document.getElementById('filterStation')?.value || '';

  let entries = db.entries.filter(e => {
    if (!allDrivers && e.driver !== currentUser) return false;
    if (month && !e.date.startsWith(month)) return false;
    if (station && e.station !== station) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  if (!entries.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text2)">No entries found.</td></tr>`;
    return;
  }
  tbody.innerHTML = entries.map((e,i)=>`
    <tr>
      <td style="color:var(--text2)">${i+1}</td>
      <td>${fmtDate(e.date)}</td>
      <td><strong>${e.driver}</strong></td>
      <td><span class="pill pill-${e.tour}">Tour ${e.tour}</span></td>
      <td style="font-weight:700;color:var(--accent)">${db.tourValues[e.tour]||0}h</td>
      <td><span class="pill pill-${e.station==='NRW'?'nrw':'wup'}">${e.station}</span></td>
      <td>
        <div class="td-actions">
          <button class="btn btn-ghost btn-xs" onclick="openEntryModal('${e.id}')">✏ Edit</button>
          <button class="btn btn-danger btn-xs" onclick="confirmDelete('${e.id}','entry')">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// -------- ADMIN APP --------
function buildAdminApp() {
  document.getElementById('navTabs').innerHTML = `
    <div class="ntab active" onclick="aNav('entries')" id="at-entries">📋 All Entries</div>
    <div class="ntab" onclick="aNav('hours')" id="at-hours">⏱ Hours Report</div>
    <div class="ntab" onclick="aNav('tours')" id="at-tours">🗺 Tours</div>

    <div class="ntab" onclick="aNav('drivers')" id="at-drivers">👥 Drivers</div>
  `;
  aNav('entries');
}

let aPage = 'entries';
function aNav(p) {
  aPage = p;
  ['entries','hours','tours','stations','drivers'].forEach(x => {
    const el = document.getElementById('at-'+x);
    if (el) el.classList.toggle('active', x===p);
  });
  if (p==='entries') renderAdminEntries();
  else if (p==='hours') renderHoursReport();
  else if (p==='tours') renderToursAdmin();
  else if (p==='stations') renderStationsAdmin();
  else if (p==='drivers') renderDriversAdmin();
}

function clearFilters() {

function populateAdminEntries() {
  const tbody = document.getElementById('adminEntriesBody');
  const month   = document.getElementById('filterMonth')?.value || '';
  const driver  = document.getElementById('filterDriver')?.value || '';
  const station = document.getElementById('filterStation')?.value || '';
  const tour    = document.getElementById('filterTour')?.value || '';

  let entries = db.entries.filter(e => {
    if (month   && !e.date.startsWith(month)) return false;
    if (driver  && e.driver  !== driver)  return false;
    if (station && e.station !== station) return false;
    if (tour    && e.tour    !== tour)    return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  if (!entries.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text2)">No entries found.</td></tr>`;
    return;
  }
  tbody.innerHTML = entries.map((e,i)=>`
    <tr>
      <td style="color:var(--text2)">${i+1}</td>
      <td>${fmtDate(e.date)}</td>
      <td><strong>${e.driver}</strong></td>
      <td><span class="pill pill-${e.tour}">Tour ${e.tour}</span></td>
      <td style="font-weight:700;color:var(--accent)">${db.tourValues[e.tour]||0}h</td>

        <div class="td-actions">
          <button class="btn btn-ghost btn-xs" onclick="openEntryModal('${e.id}')">✏ Edit</button>
          <button class="btn btn-danger btn-xs" onclick="confirmDelete('${e.id}','entry')">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// -------- HOURS REPORT --------
function renderHoursReport() {
  const c = document.getElementById('appContent');
  const isAdmin = currentRole === 'admin';

  c.innerHTML = `
    <div class="ph">
      <div><div class="ph-title">Hours Report</div><div class="ph-sub">Calculate total worked hours by tour values</div></div>
      ${isAdmin ? `<button class="btn btn-green" onclick="exportExcel()">📊 Export Excel</button>` : ''}
    </div>

    <div class="card">
      <div class="card-title">🔍 Filter</div>
      <div class="filter-bar">
        <div class="fg"><label>Month</label><input type="month" id="rMonth" onchange="calcReport()"></div>
        ${isAdmin ? `
        <div class="fg"><label>Driver</label>
          <select id="rDriver" onchange="calcReport()">
            <option value="">All Drivers</option>
            ${db.drivers.map(d=>`<option>${d}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="fg"><label>Station</label>
          <select id="rStation" onchange="calcReport()">

            ${db.stations.map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="calcReport()">↻ Calculate</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${db.tours.map(t=>`<span class="pill pill-${t}">Tour ${t} = ${db.tourValues[t]||0}h</span>`).join('')}
      </div>
    </div>

    <div id="reportOutput"></div>
  `;

  const now = new Date();
  document.getElementById('rMonth').value = now.toISOString().slice(0,7);
  calcReport();
}

function calcReport() {
  const month   = document.getElementById('rMonth')?.value || '';
  const rDriver = document.getElementById('rDriver')?.value || '';
  const station = document.getElementById('rStation')?.value || '';
  const isAdmin = currentRole === 'admin';

  let entries = db.entries.filter(e => {
    if (!isAdmin && e.driver !== currentUser) return false;
    if (isAdmin && rDriver && e.driver !== rDriver) return false;
    if (month   && !e.date.startsWith(month)) return false;
    if (station && e.station !== station)  return false;
    return true;
  });

  // Group by driver
  const byDriver = {};
  entries.forEach(e => {
    if (!byDriver[e.driver]) byDriver[e.driver] = { entries:[], tours:{} };
    byDriver[e.driver].entries.push(e);
    byDriver[e.driver].tours[e.tour] = (byDriver[e.driver].tours[e.tour]||0)+1;
  });

  const driverList = isAdmin ? Object.keys(byDriver) : [currentUser];
  let totalAllHours = 0;

  const out = document.getElementById('reportOutput');
  if (!out) return;

  if (!Object.keys(byDriver).length) {
    out.innerHTML = `<div class="card" style="text-align:center;padding:32px;color:var(--text2)">No data for selected period.</div>`;
    return;
  }

  let html = '';
  driverList.forEach(driver => {
    const data = byDriver[driver];
    if (!data) return;
    let totalHours = 0;
    db.tours.forEach(t => { totalHours += (data.tours[t]||0) * (db.tourValues[t]||0); });
    totalAllHours += totalHours;

    html += `<div class="report-driver">
      <div class="rd-header" onclick="toggleRd(this)">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;font-size:14px;flex-shrink:0">${driver.charAt(0).toUpperCase()}</div>
        <div class="rd-name">${driver}</div>
        <div style="text-align:right">
          <div class="rd-hours">${totalHours}h</div>
          <div class="rd-lbl">${data.entries.length} entries</div>
        </div>
      </div>
      <div class="rd-body">
        <div class="tour-breakdown" style="margin-bottom:12px">
          ${db.tours.filter(t=>data.tours[t]).map(t=>`
            <div class="tb-chip pill-${t}" style="border-radius:8px;padding:7px 12px">
              <span style="font-family:'Syne';font-weight:800;font-size:15px">Tour ${t}</span>
              <span style="opacity:.7">×${data.tours[t]} = <strong>${(data.tours[t])*(db.tourValues[t]||0)}h</strong></span>
            </div>`).join('')}
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Date</th><th>Tour</th><th>Hours</th><th>Station</th></tr></thead>
            <tbody>
              ${data.entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
                <tr>
                  <td>${fmtDate(e.date)}</td>
                  <td><span class="pill pill-${e.tour}">Tour ${e.tour}</span></td>
                  <td style="font-weight:700;color:var(--accent)">${db.tourValues[e.tour]||0}h</td>
                  <td><span class="pill pill-${e.station==='NRW'?'nrw':'wup'}">${e.station}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  // Total box (admin only or all-driver view)
  if (isAdmin) {
    html += `<div class="month-total-box" style="margin-top:20px">
      <div>
        <div class="mt-label">Total Hours — All Drivers</div>
        <div class="mt-val">${totalAllHours}h</div>
        <div class="mt-sub">${Object.keys(byDriver).length} drivers · ${entries.length} entries · ${month||'All time'}</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-green" onclick="exportExcel()">📊 Export to Excel</button>
      </div>
    </div>`;
  }

  out.innerHTML = html;
}

function toggleRd(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function renderTourEditor() {

      <div class="te-label">Tour ${t}</div>

function saveTourValues() {
  db.tours.forEach(t => {
    const el = document.getElementById('tv_'+t);
    if (el) db.tourValues[t] = parseFloat(el.value)||0;
  });
  saveData();
  const a = document.getElementById('tvAlert');
  a.className='alert alert-green show'; a.textContent='✓ Tour values saved!';
  setTimeout(()=>a.classList.remove('show'),3000);
}

function renderTourList() {
  const el = document.getElementById('tourList');
  if (!el) return;
  if (!db.tours.length) { el.innerHTML=`<div style="color:var(--text2);font-size:13px;padding:8px">No tours defined.</div>`; return; }
  el.innerHTML = db.tours.map(t=>`
    <div class="li-row">
      <span class="li-name"><span class="pill pill-${t}">Tour ${t}</span></span>

function addTour() {
  const val = document.getElementById('newTourInput').value.trim().toUpperCase();
  if (!val) return;
  if (db.tours.includes(val)) { alert('Tour already exists'); return; }
  db.tours.push(val);
  if (!db.tourValues[val]) db.tourValues[val] = 0;
  saveData();
  document.getElementById('newTourInput').value = '';
  renderTourEditor(); renderTourList();
}

// ============================================================
// ENTRY MODAL
// ============================================================
function openEntryModal(entryId) {
  editingEntryId = entryId || null;
  const existing = entryId ? db.entries.find(e=>e.id===entryId) : null;

  document.getElementById('entryModalTitle').textContent = existing ? 'Edit Entry' : 'Add Entry';
  document.getElementById('entryAlert').classList.remove('show');

  // Populate driver select
  const dSel = document.getElementById('eDriver');
  dSel.innerHTML = db.drivers.map(d=>`<option value="${d}" ${existing&&existing.driver===d?'selected':''}>${d}</option>`).join('');
  if (!existing && currentRole==='user') dSel.value = currentUser;

  // Date
  document.getElementById('eDate').value = existing ? existing.date : new Date().toISOString().split('T')[0];

  // Tour
  const tSel = document.getElementById('eTour');
  tSel.innerHTML = db.tours.map(t=>`<option value="${t}" ${existing&&existing.tour===t?'selected':''}>${t} (${db.tourValues[t]||0}h)</option>`).join('');

  // Station
  const sSel = document.getElementById('eStation');
  sSel.innerHTML = db.stations.map(s=>`<option value="${s}" ${existing&&existing.station===s?'selected':''}>${s}</option>`).join('');

  document.getElementById('entryModal').classList.add('open');
}

function saveEntry() {
  const driver  = document.getElementById('eDriver').value;
  const date    = document.getElementById('eDate').value;
  const tour    = document.getElementById('eTour').value;
  const station = document.getElementById('eStation').value;

  if (!driver || !date || !tour || !station) return;

  if (editingEntryId) {
    const e = db.entries.find(x=>x.id===editingEntryId);
    if (e) { e.driver=driver; e.date=date; e.tour=tour; e.station=station; }
  } else {
    db.entries.push({ id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), driver, date, tour, station });
  }
  saveData();
  closeModal('entryModal');
  if (currentRole==='user') { if(uPage==='entries') renderUserEntries(); else renderHoursReport(); }
  else { if(aPage==='entries') renderAdminEntries(); else renderHoursReport(); }
}

// ============================================================
// DELETE
// ============================================================
function confirmDelete(id, type) {
  const msgs = { entry:'Delete this tour entry?', tour:`Remove Tour "${id}"? Existing entries will keep this tour label.`, station:`Remove station "${id}"?`, driver:`Remove driver "${id}"? Their entries will remain.` };
  document.getElementById('delMsg').textContent = msgs[type] || 'Are you sure?';
  document.getElementById('delConfirmBtn').onclick = () => { doDelete(id, type); closeModal('delModal'); };
  document.getElementById('delModal').classList.add('open');
}

function doDelete(id, type) {
  if (type==='entry') db.entries = db.entries.filter(e=>e.id!==id);
  else if (type==='tour') { db.tours = db.tours.filter(t=>t!==id); delete db.tourValues[id]; }
  else if (type==='station') db.stations = db.stations.filter(s=>s!==id);
  else if (type==='driver') db.drivers = db.drivers.filter(d=>d!==id);
  saveData();
  // Refresh current page
  if (currentRole==='user') { if(uPage==='entries') renderUserEntries(); else renderHoursReport(); }
  else {
    if(aPage==='entries') renderAdminEntries();
    else if(aPage==='hours') renderHoursReport();
    else if(aPage==='tours') renderToursAdmin();
    else if(aPage==='stations') renderStationsAdmin();
    else if(aPage==='drivers') renderDriversAdmin();
  }
}

// ============================================================
// EXPORT EXCEL
// ============================================================
function exportExcel() {
  const month   = document.getElementById('rMonth')?.value || document.getElementById('filterMonth')?.value || '';
  const rDriver = document.getElementById('rDriver')?.value || '';
  const station = document.getElementById('rStation')?.value || document.getElementById('filterStation')?.value || '';

  let entries = db.entries.filter(e => {
    if (month   && !e.date.startsWith(month)) return false;
    if (rDriver && e.driver !== rDriver)  return false;
    if (station && e.station !== station) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const wb = XLSX.utils.book_new();

  // Entries sheet
  const rows = [['Date','Driver','Tour','Hours','Station']];
  entries.forEach(e => rows.push([e.date, e.driver, 'Tour '+e.tour, db.tourValues[e.tour]||0, e.station]));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:22},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Entries');

  // Summary sheet
  const byDriver = {};
  entries.forEach(e => {
    if (!byDriver[e.driver]) byDriver[e.driver] = { tours:{}, total:0 };
    byDriver[e.driver].tours[e.tour] = (byDriver[e.driver].tours[e.tour]||0)+1;
    byDriver[e.driver].total += db.tourValues[e.tour]||0;
  });

  const sumRows = [['Driver', ...db.tours.map(t=>`Tour ${t} (×count)`), 'Total Hours']];
  Object.entries(byDriver).forEach(([name, data]) => {
    sumRows.push([name, ...db.tours.map(t=>data.tours[t]||0), data.total]);
  });
  const totalRow = ['TOTAL', ...db.tours.map(t=>Object.values(byDriver).reduce((a,d)=>a+(d.tours[t]||0),0)), Object.values(byDriver).reduce((a,d)=>a+d.total,0)];
  sumRows.push(totalRow);

  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols'] = [{wch:22},...db.tours.map(()=>({wch:14})),{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  const fname = `TourReport_${month||'All'}.xlsx`;
  XLSX.writeFile(wb, fname);
}

// ============================================================
// UTILS
// ============================================================
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
