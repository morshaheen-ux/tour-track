<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TourTrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
:root{--bg:#f5f4f0;--white:#fff;--dark:#1a1a2e;--accent:#e94560;--green:#06d6a0;--blue:#3b82f6;--border:#e0ddd6;--text:#2d2d2d;--text2:#888;--radius:10px;--shadow:0 2px 16px rgba(0,0,0,.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOADER */
#globalLoader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.loader-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;}
.loader-logo span{color:var(--accent);}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:13px;color:rgba(255,255,255,.45);}

/* LOGIN */
#loginScreen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--dark);background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.02) 40px,rgba(255,255,255,.02) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.02) 40px,rgba(255,255,255,.02) 41px);}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:400px;max-width:95vw;box-shadow:0 32px 80px rgba(0,0,0,.4);}
.login-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--dark);margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:24px;letter-spacing:.5px;text-transform:uppercase;}
.login-roles{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.role-btn{flex:1;padding:10px 8px;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text2);white-space:nowrap;}
.role-btn.active{border-color:var(--accent);background:#fff0f3;color:var(--accent);}
.role-btn.super{border-color:var(--blue);}.role-btn.super.active{background:#eff6ff;color:var(--blue);border-color:var(--blue);}
.fi{margin-bottom:14px;}
.fi label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px;}
.fi input,.fi select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.fi input:focus,.fi select:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px;}
.btn-login:hover{background:var(--accent);}

/* TOPBAR */
#mainApp{display:none;min-height:100vh;}
.topbar{background:var(--dark);height:56px;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.25);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;}
.topbar-logo span{color:var(--accent);}
.topbar-info{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.55);}
.topbar-info strong{color:#fff;font-size:13px;}
.role-tag{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.role-tag.admin{background:rgba(233,69,96,.25);color:#ff8099;}
.role-tag.driver{background:rgba(6,214,160,.2);color:#06d6a0;}
.role-tag.super{background:rgba(59,130,246,.25);color:#93c5fd;}
.btn-signout{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-signout:hover{background:rgba(255,255,255,.08);color:#fff;}

/* NAV */
.nav-tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:2px;overflow-x:auto;}
.ntab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.ntab:hover{color:var(--text);}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* CONTENT */
.content{padding:28px;max-width:1200px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.ph-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--dark);}
.ph-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--dark);color:#fff;}.btn-primary:hover{background:var(--accent);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#05b888;}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;}.btn-danger:hover{background:#dc2626;color:#fff;}
.btn-sm{padding:5px 11px;font-size:11px;}.btn-xs{padding:3px 8px;font-size:10px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* FORMS */
.form-row{display:flex;gap:12px;flex-wrap:wrap;}.form-row .fg{flex:1;min-width:140px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 14px;text-align:left;background:var(--dark);color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid #f0ede8;color:var(--text);}
tr:last-child td{border-bottom:none;}tr:hover td{background:#fafaf8;}
.td-actions{display:flex;gap:6px;}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pill-A{background:#fef3c7;color:#92400e;}.pill-B{background:#dcfce7;color:#166534;}
.pill-C{background:#dbeafe;color:#1e40af;}.pill-D{background:#fce7f3;color:#9d174d;}
.pill-E{background:#ede9fe;color:#5b21b6;}.pill-none{background:#f0f0f0;color:#999;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:7px;font-size:13px;display:none;align-items:center;gap:8px;margin-bottom:14px;}
.alert.show{display:flex;}
.alert-green{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.alert-red{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;}
.alert-yellow{background:#fef9c3;border:1px solid #fde047;color:#854d0e;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:28px;width:480px;max-width:94vw;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:mIn .18s ease;max-height:90vh;overflow-y:auto;}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:18px;color:var(--dark);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

/* LIST EDITOR */
.list-items{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto;}
.li-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:#fafaf8;}
.li-name{flex:1;font-size:13px;font-weight:500;}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.add-row input:focus{border-color:var(--accent);}

/* REPORT */
.report-driver{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.rd-header{display:flex;align-items:center;padding:12px 16px;background:#f8f7f4;cursor:pointer;gap:12px;}
.rd-name{font-weight:700;font-size:14px;color:var(--dark);flex:1;}
.rd-hours{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.rd-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;}
.rd-body{padding:12px 16px;display:none;}
.rd-body.open{display:block;}
.tour-breakdown{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.tb-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.month-total-box{background:var(--dark);color:#fff;border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-top:20px;}
.mt-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;}
.mt-label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.mt-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.filter-bar .fg{margin-bottom:0;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--dark);}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;margin-top:2px;}

/* ADMIN CARD */
.admin-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.admin-avatar{width:44px;height:44px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;flex-shrink:0;}
.admin-info{flex:1;}
.admin-name{font-weight:700;font-size:14px;color:var(--dark);}
.admin-company{font-size:11px;color:var(--text2);}
.admin-meta{font-size:11px;color:var(--text2);margin-top:2px;}


/* LANG TOGGLE */
.lang-toggle{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.08);border-radius:20px;padding:3px;margin-left:8px;}
.lang-btn{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);transition:all .15s;font-family:"DM Sans",sans-serif;}
.lang-btn.active{background:var(--accent);color:#fff;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>
<body>

<div id="globalLoader">
  <div class="loader-logo">Tour<span>Track</span></div>
  <div class="spinner"></div>
  <div class="loader-msg" id="loaderMsg">Connecting…</div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Tour<span>Track</span></div>
    <div class="login-sub">Driver Hours Management</div>
    <div class="login-roles">
      <button class="role-btn active" onclick="setLoginRole('driver')" id="rl-driver">🚛 Driver</button>
      <button class="role-btn" onclick="setLoginRole('admin')" id="rl-admin">⚙️ Admin</button>
      <button class="role-btn super" onclick="setLoginRole('super')" id="rl-super">🔑 Super Admin</button>
    </div>
    <div class="fi" id="driverNameGroup">
      <label>Your Name</label>
      <input type="text" id="loginDriverName" placeholder="Enter your full name" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fi" id="adminUserGroup" style="display:none">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Admin username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fi" id="passGroup" style="display:none">
      <label id="passLabel">Password</label>
      <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="alert alert-red" id="loginAlert" style="margin-bottom:12px"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div style="margin-top:12px;font-size:11px;color:var(--text2);text-align:center" id="loginHint">Super Admin password: <strong>super2024</strong></div>
  </div>
</div>

<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">Tour<span>Track</span></div>
    <div class="topbar-info">
      <strong id="topbarName">—</strong>
      <span class="role-tag" id="topbarRole"></span>
    </div>
    <div class="lang-toggle">
    <button class="lang-btn active" id="lbtn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lbtn-de" onclick="setLang('de')">DE</button>
  </div>
  <button class="btn-signout" id="btnSignOut" onclick="logout()">Sign Out</button>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="appContent"></div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <div class="modal-title" id="entryModalTitle">Add Entry</div>
    <div class="form-row">
      <div class="fg"><label>Driver</label>
        <input type="text" id="eDriver" placeholder="Driver name">
      </div>
      <div class="fg"><label>Date</label><input type="date" id="eDate"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Tour</label><select id="eTour"></select></div>
      <div class="fg"><label>Station</label><select id="eStation"></select></div>
    </div>
    <div class="alert alert-red" id="entryAlert"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('entryModal')">Cancel</button>
      <button class="btn btn-primary" id="entrySaveBtn" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- CREATE ADMIN MODAL -->
<div class="modal-bg" id="createAdminModal">
  <div class="modal">
    <div class="modal-title">➕ Create Admin Account</div>
    <div class="fg"><label>Username</label><input type="text" id="caUsername" placeholder="e.g. john_admin"></div>
    <div class="fg"><label>Password</label><input type="password" id="caPassword" placeholder="Min 4 characters"></div>
    <div class="fg"><label>Company / Name</label><input type="text" id="caCompany" placeholder="e.g. Careon24 NRW"></div>
    <div class="alert alert-red" id="caErr"></div>
    <div class="alert alert-green" id="caOk"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('createAdminModal')">Cancel</button>
      <button class="btn btn-blue" id="caBtn" onclick="createAdmin()">Create Account</button>
    </div>
  </div>
</div>

<!-- EDIT ADMIN MODAL -->
<div class="modal-bg" id="editAdminModal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Admin Account</div>
    <input type="hidden" id="eaId">
    <div class="fg"><label>Username</label><input type="text" id="eaUsername" placeholder="Username"></div>
    <div class="fg"><label>New Password <span style="font-weight:400;text-transform:none;color:var(--text2)">(leave blank to keep current)</span></label><input type="password" id="eaPassword" placeholder="New password"></div>
    <div class="fg"><label>Company / Name</label><input type="text" id="eaCompany" placeholder="Company name"></div>
    <div class="alert alert-red" id="eaErr"></div>
    <div class="alert alert-green" id="eaOk"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('editAdminModal')">Cancel</button>
      <button class="btn btn-primary" id="eaBtn" onclick="updateAdmin()">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <div class="modal-title">🗑 Confirm Delete</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px" id="delMsg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delModal')">Cancel</button>
      <button class="btn btn-danger" id="delConfirmBtn">Delete</button>
    </div>
  </div>
</div>

function t(key) { return T[lang][key] || T.en[key] || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('lbtn-en').classList.toggle('active', l==='en');
  document.getElementById('lbtn-de').classList.toggle('active', l==='de');
  // Update static elements
  updateStaticTexts();
  // Re-render current page if logged in
  if (session.role) {
    buildNav();
  } else {
    updateLoginTexts();
  }
}

function updateStaticTexts() {
  // Topbar
  const so = document.getElementById('btnSignOut');
  if (so) so.textContent = t('signOut');
  // Modals
  updateLoginTexts();
}

function updateLoginTexts() {
  const sub = document.querySelector('.login-sub');
  if (sub) sub.textContent = t('loginSub');
  const rl_d = document.getElementById('rl-driver');
  if (rl_d) rl_d.textContent = t('roleDriver');
  const rl_a = document.getElementById('rl-admin');
  if (rl_a) rl_a.textContent = t('roleAdmin');
  const rl_s = document.getElementById('rl-super');
  if (rl_s) rl_s.textContent = t('roleSuper');
  const nameInput = document.getElementById('loginDriverName');
  if (nameInput) nameInput.placeholder = t('enterName');
  const userInput = document.getElementById('loginUsername');
  if (userInput) userInput.placeholder = t('enterUsername');
  const passInput = document.getElementById('loginPass');
  if (passInput) passInput.placeholder = t('enterPassword');
  const hint = document.getElementById('loginHint');
  if (hint) hint.innerHTML = t('superHint');
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn && !loginBtn.disabled) loginBtn.textContent = t('signIn');
  // Labels
  const nameLabel = document.querySelector('#driverNameGroup label');
  if (nameLabel) nameLabel.textContent = t('yourName');
  const userLabel = document.querySelector('#adminUserGroup label');
  if (userLabel) userLabel.textContent = t('username');
  const passLabel = document.querySelector('#passGroup label');
  if (passLabel) passLabel.textContent = t('password');
}

async function startup() {
  document.getElementById('loaderMsg').textContent = 'Connecting to database…';
  console.log('Starting up...');
  console.log('Supabase lib:', typeof supabase);
  console.log('sb client:', typeof sb);
  try {
    const { data, error } = await Promise.race([
      sb.from('settings').select('key').limit(1),
      new Promise((_,rej) => setTimeout(() => rej(new Error('Timeout after 10s')), 10000))
    ]);
    console.log('DB response:', data, error);
    if (error) throw error;
    showLogin();
  } catch(e) {
    console.error('Startup failed:', e);
    const msg = '⚠️ ' + (e.message || String(e));
    document.getElementById('loaderMsg').textContent = msg;
    const loader = document.getElementById('globalLoader');
    const old = loader.querySelector('.retry-btn');
    if (old) old.remove();
    const btn = document.createElement('button');
    btn.className = 'retry-btn';
    btn.textContent = 'Retry';
    btn.style.cssText = 'margin-top:10px;padding:10px 28px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;';
    btn.onclick = () => { btn.remove(); startup(); };
    loader.appendChild(btn);
  }
}

function showLogin() {
  document.getElementById('globalLoader').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  updateLoginTexts();
  document.getElementById('lbtn-en').classList.toggle('active', lang==='en');
  document.getElementById('lbtn-de').classList.toggle('active', lang==='de');
}

function setLoginRole(r) {
  loginRole = r;
  ['driver','admin','super'].forEach(x => {
    document.getElementById('rl-'+x).classList.toggle('active', x===r);
  });
  document.getElementById('driverNameGroup').style.display = r==='driver' ? '' : 'none';
  document.getElementById('adminUserGroup').style.display  = r!=='driver' ? '' : 'none';
  document.getElementById('passGroup').style.display       = r!=='driver' ? '' : 'none';
  document.getElementById('loginHint').style.display       = r==='super' ? '' : 'none';
  document.getElementById('loginAlert').style.display = 'none';
  if (r==='driver') setTimeout(()=>document.getElementById('loginDriverName').focus(),50);
  else setTimeout(()=>document.getElementById('loginUsername').focus(),50);
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const alertEl = document.getElementById('loginAlert');
  alertEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    if (loginRole === 'driver') {
      const name = document.getElementById('loginDriverName').value.trim();
      if (!name) { showLoginErr(t('enterNameErr')); return; }
      session = { role:'driver', user:name, adminId:null };
      enterApp();

    } else if (loginRole === 'super') {
      const user = document.getElementById('loginUsername').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!user || !pass) { showLoginErr(t('enterCredentials')); return; }
      const { data } = await sb.from('settings').select('value').eq('key','superadmin_password').single();
      const storedPass = data?.value || 'super2024';
      const { data: d2 } = await sb.from('settings').select('value').eq('key','superadmin_username').single();
      const storedUser = d2?.value || 'superadmin';
      if (pass !== storedPass || user.toLowerCase() !== storedUser.toLowerCase()) {
        showLoginErr('Incorrect username or password.'); return;
      }
      session = { role:'super', user, adminId:null };
      enterApp();

    } else {
      const user = document.getElementById('loginUsername').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!user || !pass) { showLoginErr(t('enterCredentials')); return; }
      const { data, error } = await sb.from('admins').select('*').eq('username', user).single();
      if (error || !data) { showLoginErr(t('userNotFound')); return; }
      if (data.password !== pass) { showLoginErr('Incorrect password.'); return; }
      session = { role:'admin', user:data.username, adminId:data.id, company:data.company };
      enterApp();
    }
  } catch(e) {
    showLoginErr('Error: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Sign In →';
}

function showLoginErr(msg) {
  const el = document.getElementById('loginAlert');
  el.textContent = '✗ ' + msg;
  el.className = 'alert alert-red show';
  el.style.display = 'flex';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Sign In →';
}

async function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('topbarName').textContent = session.role==='admin' && session.company
    ? `${session.user} (${session.company})` : session.user;
  const roleLabels = { driver:'Driver', admin:'Admin', super:'Super Admin' };
  const roleEl = document.getElementById('topbarRole');
  roleEl.textContent = roleLabels[session.role];
  roleEl.className = 'role-tag ' + session.role;
  await loadData();
  buildNav();
}

function logout() {
  session = { role:null, user:null, adminId:null };
  cache = { drivers:[], stations:[], tours:[], tourValues:{}, entries:[], admins:[] };
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginDriverName').value = '';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginAlert').style.display = 'none';
  setLoginRole('driver');
}

// LOAD DATA
// ============================================================
async function loadData() {
  if (session.role === 'driver') {
    // Driver only needs to load admins list to pick workspace (or just load all)
    return;
  }
  if (session.role === 'super') {
    const { data } = await sb.from('admins').select('*').order('created_at');
    cache.admins = data || [];
    const { data: drv } = await sb.from('drivers').select('name').order('name');
    cache.drivers = (drv||[]).map(d=>d.name);
    return;
  }
  // Admin: load their own workspace
  const aid = session.adminId;
  const [
    { data: drv }, { data: sta }, { data: tou },
    { data: tv },  { data: ent }
  ] = await Promise.all([
    sb.from('drivers').select('name').order('name'),
    sb.from('stations').select('*').eq('admin_id', aid).order('name'),
    sb.from('tours').select('*').eq('admin_id', aid).order('name'),
    sb.from('tour_values').select('*').eq('admin_id', aid),
    sb.from('entries').select('*').eq('admin_id', aid).order('date', {ascending:false})
  ]);
  cache.drivers  = (drv||[]).map(d=>d.name);
  cache.stations = (sta||[]).map(s=>s.name);
  cache.tours    = (tou||[]).map(t=>t.name);
  cache.entries  = ent || [];
  cache.tourValues = {};
  cache.tours.forEach(t => { cache.tourValues[t]={}; cache.stations.forEach(s=>{ cache.tourValues[t][s]=0; }); });
  (tv||[]).forEach(r => {
    if (!cache.tourValues[r.tour_name]) cache.tourValues[r.tour_name]={};
    cache.tourValues[r.tour_name][r.station_name] = parseFloat(r.hours)||0;
  });
}

function buildNav() {
  const nav = document.getElementById('navTabs');
  if (session.role === 'driver') {
    nav.innerHTML = `
      <div class="ntab active" onclick="navigate('entries')" id="nt-entries">${t('navEntries')}</div>
      <div class="ntab" onclick="navigate('hours')" id="nt-hours">${t('navHours')}</div>`;
    navigate('entries');
  } else if (session.role === 'admin') {
    nav.innerHTML = `
      <div class="ntab active" onclick="navigate('entries')" id="nt-entries">${t('navAllEntries')}</div>
      <div class="ntab" onclick="navigate('hours')" id="nt-hours">${t('navHours')}</div>
      <div class="ntab" onclick="navigate('tours')" id="nt-tours">${t('navTours')}</div>
      <div class="ntab" onclick="navigate('stations')" id="nt-stations">${t('navStations')}</div>
      <div class="ntab" onclick="navigate('drivers')" id="nt-drivers">${t('navDrivers')}</div>
      <div class="ntab" onclick="navigate('settings')" id="nt-settings">${t('navSettings')}</div>`;
    navigate('entries');
  } else {
    nav.innerHTML = `
      <div class="ntab active" onclick="navigate('admins')" id="nt-admins">${t('navAdmins')}</div>
      <div class="ntab" onclick="navigate('drivers')" id="nt-drivers">${t('navDrivers')}</div>

    navigate('admins');
  }
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('nt-'+page);
  if (el) el.classList.add('active');
  const pages = {
    entries: session.role==='driver' ? renderDriverEntries : renderAdminEntries,
    hours: renderHoursReport,
    tours: renderToursPage,
    stations: renderStationsPage,
    drivers: session.role==='super' ? renderSuperDrivers : renderAdminDrivers,
    settings: session.role==='super' ? renderSuperSettings : renderAdminSettings,
    admins: renderSuperAdmins,
  };
  pages[page]?.();
}

async function loadDriverWorkspace() {
  const adminId = document.getElementById('driverWorkspace').value;
  const container = document.getElementById('driverWorkspaceContent');
  if (!adminId) { container.innerHTML=''; return; }

  // Load this admin's tours, stations, entries for this driver
  const [{ data: sta },{ data: tou },{ data: tv },{ data: ent }] = await Promise.all([
    sb.from('stations').select('name').eq('admin_id', adminId).order('name'),
    sb.from('tours').select('name').eq('admin_id', adminId).order('name'),
    sb.from('tour_values').select('*').eq('admin_id', adminId),
    sb.from('entries').select('*').eq('admin_id', adminId).eq('driver', session.user).order('date',{ascending:false})
  ]);

  const wStations = (sta||[]).map(s=>s.name);
  const wTours    = (tou||[]).map(t=>t.name);
  const wEntries  = ent||[];
  const wValues   = {};
  wTours.forEach(t=>{ wValues[t]={}; wStations.forEach(s=>{ wValues[t][s]=0; }); });
  (tv||[]).forEach(r=>{ if(!wValues[r.tour_name]) wValues[r.tour_name]={}; wValues[r.tour_name][r.station_name]=parseFloat(r.hours)||0; });

  container.innerHTML = `
    <div class="card">
      <div class="card-title" style="justify-content:space-between">
        📋 My Entries
        <button class="btn btn-primary btn-sm" onclick="openDriverEntryModal('${adminId}')">${t('addEntry')}</button>
      </div>
      <div class="filter-bar">
        <div class="fg"><label>${t('month')}</label><input type="month" id="dFilterMonth" onchange="refreshDriverTable('${adminId}')"></div>
        <div class="fg"><label>Station</label>
          <select id="dFilterStation" onchange="refreshDriverTable('${adminId}')">
            <option value="">${t('allStations')}</option>
            ${wStations.map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>${t('thNum')}</th><th>${t('thDate')}</th><th>${t('thTour')}</th><th>${t('thHours')}</th><th>${t('thStation')}</th><th>${t('thActions')}</th></tr></thead>
          <tbody id="driverEntryBody"></tbody>
        </table>
      </div>
    </div>`;

  // Store workspace data
  window._wData = { adminId, wStations, wTours, wValues, wEntries };
  renderDriverEntryTable(wEntries, wValues);
}

function renderDriverEntryTable(entries, values) {
  const tbody = document.getElementById('driverEntryBody');
  if (!tbody) return;
  const month   = document.getElementById('dFilterMonth')?.value||'';
  const station = document.getElementById('dFilterStation')?.value||'';
  let list = entries.filter(e => {
    if (month && !e.date.startsWith(month)) return false;
    if (station && e.station!==station) return false;
    return true;
  });
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text2)">${t('noData')}</td></tr>`; return; }
  tbody.innerHTML = list.map((e,i)=>`
    <tr>
      <td style="color:var(--text2)">${i+1}</td>
      <td>${fmtDate(e.date)}</td>
      <td><span class="pill ${getPillClass(e.tour, window._wData?.wTours||[])}">Tour ${e.tour}</span></td>
      <td style="font-weight:700;color:var(--accent)">${(values[e.tour]?.[e.station])||0}h</td>
      <td>${e.station}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-xs" onclick="openDriverEntryModal('${window._wData.adminId}','${e.id}')">✏ Edit</button>
        <button class="btn btn-danger btn-xs" onclick="confirmDriverDelete('${e.id}')">🗑</button>
      </div></td>

async function saveEntry() {
  const driver  = document.getElementById('eDriver').value.trim();
  const date    = document.getElementById('eDate').value;
  const tour    = document.getElementById('eTour').value;
  const station = document.getElementById('eStation').value;
  const adminId = window._entryAdminId || session.adminId;
  if (!driver||!date||!tour||!station) { showAlert('entryAlert',t('fillFields'),'red'); return; }
  const btn = document.getElementById('entrySaveBtn');
  btn.disabled=true; btn.textContent='⏳ Saving…';
  try {
    if (editingEntryId) {
      const { error } = await sb.from('entries').update({driver,date,tour,station}).eq('id',editingEntryId);
      if (error) throw error;
      if (session.role==='admin') {
        const idx = cache.entries.findIndex(e=>e.id===editingEntryId);
        if (idx>=0) cache.entries[idx]={...cache.entries[idx],driver,date,tour,station};
      } else if (window._wData) {
        const idx = window._wData.wEntries.findIndex(e=>e.id===editingEntryId);
        if (idx>=0) window._wData.wEntries[idx]={...window._wData.wEntries[idx],driver,date,tour,station};
      }
    } else {
      const { data, error } = await sb.from('entries').insert({admin_id:adminId,driver,date,tour,station}).select().single();
      if (error) throw error;
      if (session.role==='admin') cache.entries.unshift(data);
      else if (window._wData) window._wData.wEntries.unshift(data);
    }
    closeModal('entryModal');
    if (session.role==='admin') refreshAdminEntries();
    else renderDriverEntryTable(window._wData.wEntries, window._wData.wValues);
  } catch(e) {
    showAlert('entryAlert','Error: '+e.message,'red');
  }
  btn.disabled=false; btn.textContent='Save Entry';
}

function renderHoursReport() {
  const c = document.getElementById('appContent');
  const isAdmin = session.role==='admin';
  c.innerHTML = `
    <div class="ph">
      <div><div class="ph-title">${t('hoursReport')}</div><div class="ph-sub">${t('hoursReportSub')}</div></div>
      ${isAdmin?`<button class="btn btn-green" onclick="exportExcel()">${t('exportExcel')}</button>`:''}
    </div>

      <div class="filter-bar">

        ${isAdmin?`<div class="fg"><label>Driver</label>
          <select id="rDriver" onchange="calcReport()">
            <option value="">${t('allDrivers')}</option>
            ${cache.drivers.map(d=>`<option>${d}</option>`).join('')}
          </select>
        </div>`:''}
        ${isAdmin?`<div class="fg"><label>Station</label>
          <select id="rStation" onchange="calcReport()">
            <option value="">${t('allStations')}</option>

          </select>
        </div>`:''}
        <button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="calcReport()">↻ Calculate</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${cache.tours.map(t=>`<span class="pill ${getPillClass(t,cache.tours)}">Tour ${t}: ${cache.stations.map(s=>s+' '+getTourHours(t,s)+'h').join(' / ')}</span>`).join('')}
      </div>
    </div>
    <div id="reportOutput"></div>`;
  document.getElementById('rMonth').value = new Date().toISOString().slice(0,7);
  calcReport();
}

function calcReport() {
  const entries = session.role==='driver' ? (window._wData?.wEntries||[]) : cache.entries;
  const values  = session.role==='driver' ? (window._wData?.wValues||{}) : cache.tourValues;
  const month   = document.getElementById('rMonth')?.value||'';
  const rDriver = document.getElementById('rDriver')?.value||'';
  const station = document.getElementById('rStation')?.value||'';
  const isAdmin = session.role==='admin';

  let list = entries.filter(e=>{
    if (session.role==='driver' && e.driver!==session.user) return false;
    if (isAdmin && rDriver && e.driver!==rDriver) return false;
    if (month   && !e.date.startsWith(month)) return false;
    if (station && e.station!==station) return false;
    return true;
  });

  const byDriver={};
  list.forEach(e=>{ if(!byDriver[e.driver]) byDriver[e.driver]={entries:[]}; byDriver[e.driver].entries.push(e); });
  const driverList = Object.keys(byDriver);
  let totalAll=0;
  const out=document.getElementById('reportOutput');
  if(!out) return;

  if(!driverList.length){ out.innerHTML=`<div class="card" style="text-align:center;padding:32px;color:var(--text2)">No data for selected period.</div>`; return; }

  let html='';
  driverList.forEach(driver=>{
    const data=byDriver[driver];
    let totalHours=0;
    const breakdown={};
    data.entries.forEach(e=>{
      const h=(values[e.tour]?.[e.station])||getTourHours(e.tour,e.station);
      totalHours+=h;
      const key=e.tour+'|'+e.station;
      if(!breakdown[key]) breakdown[key]={tour:e.tour,station:e.station,count:0,hours:0};
      breakdown[key].count++; breakdown[key].hours+=h;
    });
    totalAll+=totalHours;
    const tours = session.role==='driver'?(window._wData?.wTours||[]):cache.tours;
    html+=`<div class="report-driver">
      <div class="rd-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;font-size:14px;flex-shrink:0">${driver.charAt(0).toUpperCase()}</div>
        <div class="rd-name">${driver}</div>
        <div style="text-align:right"><div class="rd-hours">${totalHours}h</div><div class="rd-lbl">${data.entries.length} entries</div></div>
      </div>
      <div class="rd-body">
        <div class="tour-breakdown">
          ${Object.values(breakdown).map(b=>`
            <div class="tb-chip ${getPillClass(b.tour,tours)}" style="border-radius:8px;padding:7px 12px">
              <span style="font-family:'Syne';font-weight:800;font-size:15px">Tour ${b.tour}</span>
              <span style="background:rgba(0,0,0,.1);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">${b.station}</span>
              <span style="opacity:.7;margin-left:4px">×${b.count} = <strong>${b.hours}h</strong></span>
            </div>`).join('')}
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Date</th><th>Tour</th><th>Station</th><th>Hours</th></tr></thead>
            <tbody>
              ${data.entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
                <tr>
                  <td>${fmtDate(e.date)}</td>
                  <td><span class="pill ${getPillClass(e.tour,tours)}">Tour ${e.tour}</span></td>
                  <td>${e.station}</td>
                  <td style="font-weight:700;color:var(--accent)">${(values[e.tour]?.[e.station])||getTourHours(e.tour,e.station)}h</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  if (isAdmin) html+=`<div class="month-total-box">
    <div><div class="mt-label">Total Hours — All Drivers</div><div class="mt-val">${totalAll}h</div><div class="mt-sub">${driverList.length} drivers · ${list.length} entries · ${month||'All time'}</div></div>
    <div style="margin-left:auto"><button class="btn btn-green" onclick="exportExcel()">${t('exportExcel')}</button></div>
  </div>`;
  out.innerHTML=html;
}

async function saveTourValues() {
  const btn=document.querySelector('[onclick="saveTourValues()"]');

    const upserts=[];
    cache.tours.forEach(t=>{ cache.stations.forEach(s=>{ const el=document.getElementById('tv_'+t+'_'+s.replace(/\s/g,'_')); const val=parseFloat(el?.value)||0; if(!cache.tourValues[t]) cache.tourValues[t]={}; cache.tourValues[t][s]=val; upserts.push({admin_id:session.adminId,tour_name:t,station_name:s,hours:val}); }); });
    const { error }=await sb.from('tour_values').upsert(upserts,{onConflict:'admin_id,tour_name,station_name'});
    if(error) throw error;
    showAlert('tvAlert',t('savedOk'),'green');
  } catch(e){ showAlert('tvAlert','✗ '+e.message,'red'); }
  btn.disabled=false; btn.textContent='💾 Save Values';
}

  const c=document.getElementById('appContent');
  c.innerHTML=`
    <div class="ph">
      <div><div class="ph-title">${t('adminAccounts')}</div><div class="ph-sub">${cache.admins.length} admin accounts</div></div>
      <button class="btn btn-blue" onclick="document.getElementById('createAdminModal').classList.add('open')">${t('createAdmin')}</button>
    </div>
    <div id="adminsList"></div>`;
  renderAdminsList();
}

function renderAdminsList() {
  const el=document.getElementById('adminsList'); if(!el) return;
  if(!cache.admins.length){ el.innerHTML=`<div class="card" style="text-align:center;padding:32px;color:var(--text2)">No admin accounts yet. Create the first one!</div>`; return; }
  el.innerHTML=cache.admins.map(a=>`
    <div class="admin-card">
      <div class="admin-avatar">${a.username.charAt(0).toUpperCase()}</div>
      <div class="admin-info">
        <div class="admin-name">${a.username}</div>
        <div class="admin-company">${a.company||'—'}</div>
        <div class="admin-meta">Created: ${fmtDate(a.created_at?.split('T')[0])}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="openEditAdmin('${a.id}','${a.username}','${a.company||''}')">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('${a.id}','admin_account')">🗑 Delete</button>
      </div>
    </div>`).join('');
}

async function createAdmin() {
  const username=document.getElementById('caUsername').value.trim();
  const password=document.getElementById('caPassword').value;
  const company=document.getElementById('caCompany').value.trim();
  if(!username||!password){ showAlert('caErr','Fill in username and password.','red'); return; }
  if(password.length<4){ showAlert('caErr',t('passMin4'),'red'); return; }
  const btn=document.getElementById('caBtn'); btn.disabled=true; btn.textContent='⏳ Creating…';
  const { data, error }=await sb.from('admins').insert({username,password,company}).select().single();
  if(error){ showAlert('caErr','✗ '+error.message,'red'); btn.disabled=false; btn.textContent='Create Account'; return; }
  cache.admins.push(data);
  document.getElementById('caUsername').value=''; document.getElementById('caPassword').value=''; document.getElementById('caCompany').value='';
  showAlert('caOk',t('adminCreated'),'green');
  btn.disabled=false; btn.textContent='Create Account';
  renderAdminsList();
}

function openEditAdmin(id, username, company) {
  document.getElementById('eaId').value=id;
  document.getElementById('eaUsername').value=username;
  document.getElementById('eaPassword').value='';
  document.getElementById('eaCompany').value=company;
  document.getElementById('eaErr').classList.remove('show');
  document.getElementById('eaOk').classList.remove('show');
  document.getElementById('editAdminModal').classList.add('open');
}

async function updateAdmin() {
  const id=document.getElementById('eaId').value;
  const username=document.getElementById('eaUsername').value.trim();
  const password=document.getElementById('eaPassword').value;
  const company=document.getElementById('eaCompany').value.trim();
  if(!username){ showAlert('eaErr',t('usernameRequired'),'red'); return; }
  const update={username,company};
  if(password){ if(password.length<4){ showAlert('eaErr','Password min 4 chars.','red'); return; } update.password=password; }
  const btn=document.getElementById('eaBtn'); btn.disabled=true; btn.textContent='⏳ Saving…';
  const { error }=await sb.from('admins').update(update).eq('id',id);
  if(error){ showAlert('eaErr','✗ '+error.message,'red'); btn.disabled=false; btn.textContent='Save Changes'; return; }
  const idx=cache.admins.findIndex(a=>a.id===id);
  if(idx>=0) cache.admins[idx]={...cache.admins[idx],...update};
  showAlert('eaOk',t('updatedOk'),'green');
  btn.disabled=false; btn.textContent='Save Changes';
  renderAdminsList();
}

function renderSuperSettings() {
  const c=document.getElementById('appContent');
  c.innerHTML=`

    <div class="card" style="max-width:460px">

      <div class="alert alert-green" id="suOk"></div>

async function changeSuperUsername() {
  const newUser=document.getElementById('suNew').value.trim();
  const pass=document.getElementById('suPass').value;
  const { data }=await sb.from('settings').select('value').eq('key','superadmin_password').single();
  if(pass!==data?.value){ showAlert('suErr',t('incorrectPass'),'red'); return; }
  if(!newUser){ showAlert('suErr',t('enterNewUsername'),'red'); return; }
  await sb.from('settings').upsert({key:'superadmin_username',value:newUser},{onConflict:'key'});
  session.user=newUser; document.getElementById('topbarName').textContent=newUser;
  document.getElementById('suNew').value=''; document.getElementById('suPass').value='';
  showAlert('suOk',t('usernameUpdated'),'green');
}

async function changeSuperPassword() {
  const current=document.getElementById('spCurrent').value;
  const newPass=document.getElementById('spNew').value;
  const confirm=document.getElementById('spConfirm').value;
  const { data }=await sb.from('settings').select('value').eq('key','superadmin_password').single();
  if(current!==data?.value){ showAlert('spErr',t('currentPassWrong'),'red'); return; }
  if(newPass.length<4){ showAlert('spErr',t('minChars'),'red'); return; }
  if(newPass!==confirm){ showAlert('spErr',t('passMismatch'),'red'); return; }
  await sb.from('settings').upsert({key:'superadmin_password',value:newPass},{onConflict:'key'});
  document.getElementById('spCurrent').value=''; document.getElementById('spNew').value=''; document.getElementById('spConfirm').value='';
  showAlert('spOk',t('passUpdated'),'green');
}

// DELETE
// ============================================================
function confirmDelete(id, type) {
  const msgs={entry:t('deleteEntry'),tour:`Remove Tour "${id}"?`,station:`Remove station "${id}"?`,driver:`Remove driver "${id}"?`,admin_account:'Delete this admin account and ALL their data?'};
  document.getElementById('delMsg').textContent=msgs[type]||'Are you sure?';
  document.getElementById('delConfirmBtn').onclick=()=>{ doDelete(id,type); closeModal('delModal'); };
  document.getElementById('delModal').classList.add('open');
}

async function doDelete(id, type) {
  if(type==='entry'){ await sb.from('entries').delete().eq('id',id); cache.entries=cache.entries.filter(e=>e.id!==id); refreshAdminEntries(); }
  else if(type==='tour'){ await sb.from('tours').delete().eq('name',id).eq('admin_id',session.adminId); await sb.from('tour_values').delete().eq('tour_name',id).eq('admin_id',session.adminId); cache.tours=cache.tours.filter(t=>t!==id); delete cache.tourValues[id]; renderTourEditor(); renderTourList(); }
  else if(type==='station'){ await sb.from('stations').delete().eq('name',id).eq('admin_id',session.adminId); await sb.from('tour_values').delete().eq('station_name',id).eq('admin_id',session.adminId); cache.stations=cache.stations.filter(s=>s!==id); cache.tours.forEach(t=>{delete cache.tourValues[t]?.[id];}); renderStationList(); }
  else if(type==='driver'){ await sb.from('drivers').delete().eq('name',id); cache.drivers=cache.drivers.filter(d=>d!==id); renderDriverList(); }
  else if(type==='admin_account'){ await sb.from('admins').delete().eq('id',id); cache.admins=cache.admins.filter(a=>a.id!==id); renderAdminsList(); }
}

// ============================================================
// EXPORT EXCEL
// ============================================================
function exportExcel() {
  const month=document.getElementById('rMonth')?.value||document.getElementById('filterMonth')?.value||'';
  const rDriver=document.getElementById('rDriver')?.value||'';
  const station=document.getElementById('rStation')?.value||document.getElementById('filterStation')?.value||'';
  let list=cache.entries.filter(e=>{
    if(month&&!e.date.startsWith(month)) return false;
    if(rDriver&&e.driver!==rDriver) return false;
    if(station&&e.station!==station) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const wb=XLSX.utils.book_new();
  const rows=[['Date','Driver','Tour','Hours','Station']];
  list.forEach(e=>rows.push([e.date,e.driver,'Tour '+e.tour,getTourHours(e.tour,e.station),e.station]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:22},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'Entries');
  const byDriver={};
  list.forEach(e=>{ if(!byDriver[e.driver]) byDriver[e.driver]={tours:{},total:0}; byDriver[e.driver].tours[e.tour]=(byDriver[e.driver].tours[e.tour]||0)+1; byDriver[e.driver].total+=getTourHours(e.tour,e.station); });
  const sumRows=[['Driver',...cache.tours.map(t=>`Tour ${t} (count)`),'Total Hours']];
  Object.entries(byDriver).forEach(([name,data])=>sumRows.push([name,...cache.tours.map(t=>data.tours[t]||0),data.total]));
  sumRows.push(['TOTAL',...cache.tours.map(t=>Object.values(byDriver).reduce((a,d)=>a+(d.tours[t]||0),0)),Object.values(byDriver).reduce((a,d)=>a+d.total,0)]);
  const ws2=XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols']=[{wch:22},...cache.tours.map(()=>({wch:14})),{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');
  XLSX.writeFile(wb,`TourReport_${month||'All'}.xlsx`);
}

// ============================================================
// HELPERS
// ============================================================
function getTourHours(tour,station){ return cache.tourValues[tour]?.[station]||0; }
function fmtDate(d){ if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function showAlert(id,msg,type='green'){
  const el=document.getElementById(id);
  if(!el) return;
  el.className=`alert alert-${type} show`;
  el.textContent=msg; el.style.display='flex';
  setTimeout(()=>{ el.classList.remove('show'); el.style.display='none'; },4000);
}
function getPillClass(tour,tours){
  const colors=['pill-A','pill-B','pill-C','pill-D','pill-E'];
  const known=['A','B','C','D','E'];
  if(known.includes(tour)) return 'pill-'+tour;
  const idx=(tours||[]).indexOf(tour);
  return idx>=0?colors[idx%colors.length]:'pill-none';
}
