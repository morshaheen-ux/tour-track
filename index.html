<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Hours Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
:root {
  --bg:#f5f4f0;--white:#fff;--dark:#1a1a2e;--accent:#e94560;--green:#06d6a0;
  --border:#e0ddd6;--text:#2d2d2d;--text2:#888;--radius:10px;--shadow:0 2px 16px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOADER */
#globalLoader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.loader-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;}
.loader-logo span{color:var(--accent);}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:13px;color:rgba(255,255,255,.45);}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.02) 40px,rgba(255,255,255,.02) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.02) 40px,rgba(255,255,255,.02) 41px);}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 32px 80px rgba(0,0,0,.4);}
.login-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--dark);margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:.5px;text-transform:uppercase;}
.login-roles{display:flex;gap:8px;margin-bottom:20px;}
.role-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text2);}
.role-btn.active{border-color:var(--accent);background:#fff0f3;color:var(--accent);}
.fi{margin-bottom:14px;}
.fi label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px;}
.fi input,.fi select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.fi input:focus,.fi select:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px;}
.btn-login:hover{background:var(--accent);}
.login-hint{font-size:11px;color:var(--text2);text-align:center;margin-top:12px;}

/* TOPBAR */
#mainApp{display:none;min-height:100vh;}
.topbar{background:var(--dark);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.25);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;}
.topbar-logo span{color:var(--accent);}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.55);}
.topbar-user strong{color:#fff;font-size:13px;}
.btn-signout{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-signout:hover{background:rgba(255,255,255,.08);color:#fff;}

/* NAV */
.nav-tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:2px;overflow-x:auto;}
.ntab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.ntab:hover{color:var(--text);}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* CONTENT */
.content{padding:28px;max-width:1200px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.ph-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--dark);}
.ph-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--dark);color:#fff;}.btn-primary:hover{background:var(--accent);}
.btn-accent{background:var(--accent);color:#fff;}.btn-accent:hover{background:#c73652;}
.btn-green{background:#06d6a0;color:#fff;}.btn-green:hover{background:#05b888;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;}.btn-danger:hover{background:#dc2626;color:#fff;}
.btn-sm{padding:5px 11px;font-size:11px;}.btn-xs{padding:3px 8px;font-size:10px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* FORMS */
.form-row{display:flex;gap:12px;flex-wrap:wrap;}.form-row .fg{flex:1;min-width:140px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 14px;text-align:left;background:var(--dark);color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid #f0ede8;color:var(--text);}
tr:last-child td{border-bottom:none;}tr:hover td{background:#fafaf8;}
.td-actions{display:flex;gap:6px;}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pill-A{background:#fef3c7;color:#92400e;}.pill-B{background:#dcfce7;color:#166534;}
.pill-C{background:#dbeafe;color:#1e40af;}.pill-D{background:#fce7f3;color:#9d174d;}
.pill-E{background:#ede9fe;color:#5b21b6;}.pill-none{background:#f0f0f0;color:#999;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:7px;font-size:13px;display:none;align-items:center;gap:8px;margin-bottom:14px;}
.alert.show{display:flex;}
.alert-green{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.alert-red{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;}
.alert-yellow{background:#fef9c3;border:1px solid #fde047;color:#854d0e;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:28px;width:460px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:mIn .18s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:18px;color:var(--dark);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

/* LIST EDITOR */
.list-items{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto;}
.li-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:#fafaf8;}
.li-name{flex:1;font-size:13px;font-weight:500;}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.add-row input:focus{border-color:var(--accent);}

/* REPORT */
.report-driver{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.rd-header{display:flex;align-items:center;padding:12px 16px;background:#f8f7f4;cursor:pointer;gap:12px;}
.rd-name{font-weight:700;font-size:14px;color:var(--dark);flex:1;}
.rd-hours{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.rd-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;}
.rd-body{padding:12px 16px;display:none;}
.rd-body.open{display:block;}
.tour-breakdown{display:flex;gap:8px;flex-wrap:wrap;}
.tb-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.month-total-box{background:var(--dark);color:#fff;border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.mt-label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.mt-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;}
.mt-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.filter-bar .fg{margin-bottom:0;}

/* TOUR TABLE */
.tour-editor{width:100%;}
.tour-editor input[type=number]:focus{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(233,69,96,.1);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--dark);}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;margin-top:2px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>
<body>

<!-- GLOBAL LOADER -->
<div id="globalLoader">
  <div class="loader-logo">Tour<span>Track</span></div>
  <div class="spinner"></div>
  <div class="loader-msg" id="loaderMsg">Connecting to database…</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">Tour<span>Track</span></div>
    <div class="login-sub">Driver Hours Management</div>
    <div class="login-roles">
      <button class="role-btn active" onclick="setRole('user')" id="rl-user">👤 Driver Portal</button>
      <button class="role-btn" onclick="setRole('admin')" id="rl-admin">⚙️ Admin Portal</button>
    </div>
    <div class="fi">
      <label>Your Name</label>
      <select id="loginName"><option value="">— Select your name —</option></select>
    </div>
    <div class="fi" id="passGroup" style="display:none">
      <label>Admin Password</label>
      <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="alert alert-red" id="loginAlert" style="display:none">Incorrect password.</div>
    <button class="btn-login" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">Tour<span>Track</span></div>
    <div class="topbar-user">
      Signed in as &nbsp;<strong id="topbarName">—</strong>
      &nbsp;·&nbsp;
      <span id="topbarRole" style="color:var(--accent);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px"></span>
    </div>
    <button class="btn-signout" onclick="logout()">Sign Out</button>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="appContent"></div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <div class="modal-title" id="entryModalTitle">Add Entry</div>
    <div class="form-row">
      <div class="fg"><label>Driver</label><select id="eDriver"></select></div>
      <div class="fg"><label>Date</label><input type="date" id="eDate"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Tour</label><select id="eTour"></select></div>
      <div class="fg"><label>Station</label><select id="eStation"></select></div>
    </div>
    <div class="alert alert-red" id="entryAlert"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('entryModal')">Cancel</button>
      <button class="btn btn-primary" id="entrySaveBtn" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <div class="modal-title">🗑 Confirm Delete</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px" id="delMsg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delModal')">Cancel</button>
      <button class="btn btn-danger" id="delConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SUPABASE INIT
// ============================================================
const SUPABASE_URL = 'https://clvzwiykjqrpnhgaywlr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsdnp3aXlranFycG5oZ2F5d2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTQzMjksImV4cCI6MjA5NDc3MDMyOX0.T7p4RTZAzW3_dUVPSOrzTLz-My_9a1lQZRgNEkliR_A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentRole = null;
let loginRole   = 'user';
let editingEntryId = null;

// In-memory cache (loaded from Supabase on login)
let drivers    = [];
let stations   = [];
let tours      = [];
let tourValues = {}; // { 'A': { 'NRW': 8, 'Wuppertal': 6 } }
let entries    = [];
let adminPassword = 'admin2024';

// ============================================================
// STARTUP — load drivers for login dropdown
// ============================================================
async function startup() {
  setLoaderMsg('Connecting to database…');
  try {
    const { data, error } = await sb.from('drivers').select('name').order('name');
    if (error) throw error;
    drivers = data.map(d => d.name);
    populateLoginDropdown();
    hideLoader();
  } catch(e) {
    setLoaderMsg('⚠️ Cannot connect. Check your internet connection.');
    console.error(e);
  }
}

function setLoaderMsg(m) { document.getElementById('loaderMsg').textContent = m; }
function hideLoader() {
  document.getElementById('globalLoader').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function populateLoginDropdown() {
  const sel = document.getElementById('loginName');
  sel.innerHTML = '<option value="">— Select your name —</option>' +
    drivers.map(d => `<option value="${d}">${d}</option>`).join('');
}

// ============================================================
// LOGIN
// ============================================================
function setRole(r) {
  loginRole = r;
  document.getElementById('rl-user').classList.toggle('active', r==='user');
  document.getElementById('rl-admin').classList.toggle('active', r==='admin');
  document.getElementById('passGroup').style.display = r==='admin' ? '' : 'none';
  const sel = document.getElementById('loginName');
  if (r === 'admin') {
    sel.innerHTML = '<option value="">— Select your name —</option>' +
      drivers.map(d=>`<option>${d}</option>`).join('');
  }
}

async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const alertEl = document.getElementById('loginAlert');
  alertEl.style.display = 'none';
  if (!name) { document.getElementById('loginName').focus(); return; }

  if (loginRole === 'admin') {
    // Fetch password from Supabase
    const { data } = await sb.from('settings').select('value').eq('key','admin_password').single();
    const storedPass = data?.value || 'admin2024';
    if (pass !== storedPass) {
      alertEl.style.display = 'flex'; alertEl.className = 'alert alert-red show';
      alertEl.textContent = '✗ Incorrect password.'; return;
    }
    currentRole = 'admin';
  } else {
    currentRole = 'user';
  }

  currentUser = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('topbarName').textContent = currentUser;
  document.getElementById('topbarRole').textContent = currentRole === 'admin' ? 'Admin' : 'Driver';

  await loadAllData();
  buildApp();
}

function logout() {
  currentUser = null; currentRole = null; editingEntryId = null;
  entries = []; tourValues = {};
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginAlert').style.display = 'none';
  setRole('user');
  populateLoginDropdown();
}

// ============================================================
// LOAD ALL DATA
// ============================================================
async function loadAllData() {
  const [
    { data: drvData },
    { data: staData },
    { data: tourData },
    { data: tvData },
    { data: entData },
    { data: setData }
  ] = await Promise.all([
    sb.from('drivers').select('name').order('name'),
    sb.from('stations').select('name').order('name'),
    sb.from('tours').select('name').order('name'),
    sb.from('tour_values').select('*'),
    sb.from('entries').select('*').order('date', { ascending: false }),
    sb.from('settings').select('*')
  ]);

  drivers  = (drvData || []).map(d => d.name);
  stations = (staData || []).map(s => s.name);
  tours    = (tourData || []).map(t => t.name);
  entries  = entData || [];

  // Build tourValues object
  tourValues = {};
  tours.forEach(t => { tourValues[t] = {}; stations.forEach(s => { tourValues[t][s] = 0; }); });
  (tvData || []).forEach(row => {
    if (!tourValues[row.tour_name]) tourValues[row.tour_name] = {};
    tourValues[row.tour_name][row.station_name] = parseFloat(row.hours) || 0;
  });

  adminPassword = (setData || []).find(r => r.key === 'admin_password')?.value || 'admin2024';
}

// ============================================================
// HELPERS
// ============================================================
function getTourHours(tour, station) {
  return tourValues[tour]?.[station] || 0;
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showAlert(id, msg, type='green') {
  const el = document.getElementById(id);
  el.className = `alert alert-${type} show`;
  el.textContent = msg;
  el.style.display = 'flex';
  setTimeout(() => { el.classList.remove('show'); el.style.display='none'; }, 4000);
}

function getPillClass(tourName) {
  const known = ['A','B','C','D','E'];
  const idx = known.indexOf(tourName);
  if (idx >= 0) return `pill-${tourName}`;
  // For custom tours cycle through colors
  const colors = ['pill-A','pill-B','pill-C','pill-D','pill-E'];
  return colors[tours.indexOf(tourName) % colors.length] || 'pill-none';
}

// ============================================================
// APP BUILDER
// ============================================================
function buildApp() {
  if (currentRole === 'user') buildUserApp();
  else buildAdminApp();
}

// ============================================================
// USER APP
// ============================================================
function buildUserApp() {
  document.getElementById('navTabs').innerHTML = `
    <div class="ntab active" onclick="uNav('entries')" id="ut-entries">📋 My Entries</div>
    <div class="ntab" onclick="uNav('hours')" id="ut-hours">⏱ Hours Report</div>
  `;
  uNav('entries');
}

let uPage = 'entries';
function uNav(p) {
  uPage = p;
  ['entries','hours'].forEach(x => {
    const el = document.getElementById('ut-'+x);
    if (el) el.classList.toggle('active', x===p);
  });
  if (p==='entries') renderUserEntries();
  else renderHoursReport();
}

function renderUserEntries() {
  const c = document.getElementById('appContent');
  c.innerHTML = `
    <div class="ph">
      <div><div class="ph-title">My Tour Entries</div><div class="ph-sub">Add and manage your daily tour records</div></div>
      <button class="btn btn-primary" onclick="openEntryModal()">+ Add Entry</button>

function renderHoursReport() {
  const c = document.getElementById('appContent');
  const isAdmin = currentRole === 'admin';
  c.innerHTML = `
    <div class="ph">
      <div><div class="ph-title">Hours Report</div><div class="ph-sub">Total hours calculated from tour values per station</div></div>

        ${isAdmin ? `<div class="fg"><label>Driver</label>
          <select id="rDriver" onchange="calcReport()">
            <option value="">All Drivers</option>
            ${drivers.map(d=>`<option>${d}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="fg"><label>Station</label>
          <select id="rStation" onchange="calcReport()">
            <option value="">All Stations</option>
            ${stations.map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="calcReport()">↻ Calculate</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${tours.map(t=>`<span class="pill ${getPillClass(t)}">Tour ${t}: ${stations.map(s=>s+' '+getTourHours(t,s)+'h').join(' / ')}</span>`).join('')}
      </div>
    </div>
    <div id="reportOutput"></div>`;
  const now = new Date();
  document.getElementById('rMonth').value = now.toISOString().slice(0,7);
  calcReport();
}

function calcReport() {
  const month   = document.getElementById('rMonth')?.value || '';
  const rDriver = document.getElementById('rDriver')?.value || '';
  const station = document.getElementById('rStation')?.value || '';
  const isAdmin = currentRole === 'admin';

  let list = entries.filter(e => {
    if (!isAdmin && e.driver !== currentUser) return false;
    if (isAdmin && rDriver && e.driver !== rDriver) return false;
    if (month   && !e.date.startsWith(month)) return false;
    if (station && e.station !== station) return false;
    return true;
  });

  const byDriver = {};
  list.forEach(e => {
    if (!byDriver[e.driver]) byDriver[e.driver] = { entries:[] };
    byDriver[e.driver].entries.push(e);
  });

  const driverList = isAdmin ? Object.keys(byDriver) : (byDriver[currentUser] ? [currentUser] : []);
  let totalAll = 0;
  const out = document.getElementById('reportOutput');
  if (!out) return;

  if (!driverList.length) {
    out.innerHTML = `<div class="card" style="text-align:center;padding:32px;color:var(--text2)">No data for selected period.</div>`;
    return;
  }

  let html = '';
  driverList.forEach(driver => {
    const data = byDriver[driver];
    let totalHours = 0;
    data.entries.forEach(e => { totalHours += getTourHours(e.tour, e.station); });
    totalAll += totalHours;

    const breakdown = {};
    data.entries.forEach(e => {
      const key = e.tour+'|'+e.station;
      if (!breakdown[key]) breakdown[key] = { tour:e.tour, station:e.station, count:0, hours:0 };
      breakdown[key].count++;
      breakdown[key].hours += getTourHours(e.tour, e.station);
    });

    html += `<div class="report-driver">
      <div class="rd-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;font-size:14px;flex-shrink:0">${driver.charAt(0).toUpperCase()}</div>
        <div class="rd-name">${driver}</div>
        <div style="text-align:right">
          <div class="rd-hours">${totalHours}h</div>
          <div class="rd-lbl">${data.entries.length} entries</div>
        </div>
      </div>
      <div class="rd-body">
        <div class="tour-breakdown" style="margin-bottom:12px">
          ${Object.values(breakdown).map(b=>`
            <div class="tb-chip ${getPillClass(b.tour)}" style="border-radius:8px;padding:7px 12px">
              <span style="font-family:'Syne';font-weight:800;font-size:15px">Tour ${b.tour}</span>
              <span style="background:rgba(0,0,0,.08);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">${b.station}</span>
              <span style="opacity:.7;margin-left:4px">×${b.count} = <strong>${b.hours}h</strong></span>
            </div>`).join('')}
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Date</th><th>Tour</th><th>Station</th><th>Hours</th></tr></thead>
            <tbody>
              ${data.entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
                <tr>
                  <td>${fmtDate(e.date)}</td>
                  <td><span class="pill ${getPillClass(e.tour)}">Tour ${e.tour}</span></td>
                  <td>${e.station}</td>
                  <td style="font-weight:700;color:var(--accent)">${getTourHours(e.tour,e.station)}h</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  if (isAdmin) {
    html += `<div class="month-total-box" style="margin-top:20px">
      <div>
        <div class="mt-label">Total Hours — All Drivers</div>
        <div class="mt-val">${totalAll}h</div>
        <div class="mt-sub">${driverList.length} drivers · ${list.length} entries · ${month||'All time'}</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-green" onclick="exportExcel()">📊 Export to Excel</button>
      </div>
    </div>`;
  }
  out.innerHTML = html;
}

function renderTourEditor() {

    el.innerHTML = '<p style="color:var(--text2);font-size:13px">Add stations and tours first.</p>'; return;
  }
  let html = `<div class="tbl-wrap"><table>
    <thead><tr><th>Tour</th>${stations.map(s=>`<th style="text-align:center">${s}<br><span style="font-size:9px;font-weight:400;opacity:.6">hours/cycle</span></th>`).join('')}</tr></thead>
    <tbody>`;
  tours.forEach(t => {
    html += `<tr><td><span class="pill ${getPillClass(t)}" style="font-size:13px;padding:4px 12px">Tour ${t}</span></td>
      ${stations.map(s=>`
        <td style="text-align:center">
          <input type="number" min="0" step="0.5" value="${tourValues[t]?.[s]??0}"
            id="tv_${t}_${s.replace(/\s/g,'_')}"
            style="width:80px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-weight:700;text-align:center;font-family:'DM Sans',sans-serif;outline:none;color:var(--text)">
        </td>`).join('')}
    </tr>`;
  });
  html += `</tbody></table></div>`;

}

async function saveTourValues() {
  const btn = document.querySelector('[onclick="saveTourValues()"]');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  try {
    const upserts = [];
    tours.forEach(t => {
      stations.forEach(s => {
        const key = 'tv_'+t+'_'+s.replace(/\s/g,'_');
        const el = document.getElementById(key);
        const val = parseFloat(el?.value)||0;
        if (!tourValues[t]) tourValues[t] = {};
        tourValues[t][s] = val;
        upserts.push({ tour_name:t, station_name:s, hours:val });
      });
    });
    const { error } = await sb.from('tour_values').upsert(upserts, { onConflict:'tour_name,station_name' });
    if (error) throw error;
    showAlert('tvAlert','✓ Tour values saved!','green');
  } catch(e) {
    showAlert('tvAlert','✗ Error: '+e.message,'red');
  }
  btn.disabled = false; btn.textContent = '💾 Save Values';
}

function renderTourList() {
  const el = document.getElementById('tourList');
  if (!el) return;
  if (!tours.length) { el.innerHTML=`<div style="color:var(--text2);font-size:13px;padding:8px">No tours defined.</div>`; return; }
  el.innerHTML = tours.map(t => {
    const summary = stations.map(s=>`${s}: ${tourValues[t]?.[s]??0}h`).join(' · ');
    return `<div class="li-row">
      <span class="li-name"><span class="pill ${getPillClass(t)}">Tour ${t}</span></span>
      <span style="font-size:12px;color:var(--text2)">${summary}</span>
      <button class="btn btn-danger btn-xs" onclick="confirmDelete('${t}','tour')">🗑</button>
    </div>`;
  }).join('');
}

async function addTour() {
  const val = document.getElementById('newTourInput').value.trim().toUpperCase();
  if (!val || tours.includes(val)) return;
  const { error } = await sb.from('tours').insert({ name:val });
  if (error) { alert('Error: '+error.message); return; }
  // Add tour_values rows for all stations
  const rows = stations.map(s=>({ tour_name:val, station_name:s, hours:0 }));
  if (rows.length) await sb.from('tour_values').insert(rows);
  tours.push(val);
  tourValues[val] = {};
  stations.forEach(s => { tourValues[val][s] = 0; });
  document.getElementById('newTourInput').value = '';
  renderTourEditor(); renderTourList();
}

async function changePassword() {
  const current = document.getElementById('cpCurrent').value;
  const newPass  = document.getElementById('cpNew').value;
  const confirm  = document.getElementById('cpConfirm').value;
  document.getElementById('cpOk').classList.remove('show');
  document.getElementById('cpErr').classList.remove('show');

  // Fetch latest password from DB
  const { data } = await sb.from('settings').select('value').eq('key','admin_password').single();
  const stored = data?.value || 'admin2024';

  if (current !== stored) { showAlert('cpErr','✗ Current password is incorrect.','red'); return; }
  if (newPass.length < 4) { showAlert('cpErr','✗ New password must be at least 4 characters.','red'); return; }
  if (newPass !== confirm) { showAlert('cpErr','✗ Passwords do not match.','red'); return; }

  const btn = document.getElementById('cpBtn');
  btn.disabled=true; btn.textContent='⏳ Saving…';

  const { error } = await sb.from('settings').upsert({ key:'admin_password', value:newPass }, { onConflict:'key' });
  if (error) { showAlert('cpErr','✗ Error: '+error.message,'red'); btn.disabled=false; btn.textContent='🔒 Update Password'; return; }

  adminPassword = newPass;
  document.getElementById('cpCurrent').value='';
  document.getElementById('cpNew').value='';
  document.getElementById('cpConfirm').value='';
  showAlert('cpOk','✓ Password updated successfully! Saved to database.','green');
  btn.disabled=false; btn.textContent='🔒 Update Password';
}

  const dSel = document.getElementById('eDriver');
  dSel.innerHTML = drivers.map(d=>`<option value="${d}" ${existing?.driver===d?'selected':''}>${d}</option>`).join('');
  if (!existing && currentRole==='user') dSel.value = currentUser;

  document.getElementById('eDate').value = existing?.date || new Date().toISOString().split('T')[0];

  const tSel = document.getElementById('eTour');
  tSel.innerHTML = tours.map(t=>`<option value="${t}" ${existing?.tour===t?'selected':''}>${t}</option>`).join('');

  const sSel = document.getElementById('eStation');
  sSel.innerHTML = stations.map(s=>`<option value="${s}" ${existing?.station===s?'selected':''}>${s}</option>`).join('');

  document.getElementById('entryModal').classList.add('open');
}

async function saveEntry() {
  const driver  = document.getElementById('eDriver').value;
  const date    = document.getElementById('eDate').value;
  const tour    = document.getElementById('eTour').value;
  const station = document.getElementById('eStation').value;
  if (!driver||!date||!tour||!station) return;

  const btn = document.getElementById('entrySaveBtn');
  btn.disabled=true; btn.textContent='⏳ Saving…';

  try {
    if (editingEntryId) {
      const { error } = await sb.from('entries').update({ driver, date, tour, station }).eq('id', editingEntryId);
      if (error) throw error;
      const idx = entries.findIndex(e=>e.id===editingEntryId);
      if (idx>=0) entries[idx] = { ...entries[idx], driver, date, tour, station };
    } else {
      const { data, error } = await sb.from('entries').insert({ driver, date, tour, station }).select().single();
      if (error) throw error;
      entries.unshift(data);
    }
    closeModal('entryModal');
    if (currentRole==='user') { uPage==='entries' ? renderUserEntries() : renderHoursReport(); }
    else { aPage==='entries' ? renderAdminEntries() : renderHoursReport(); }
  } catch(e) {
    document.getElementById('entryAlert').className='alert alert-red show';
    document.getElementById('entryAlert').textContent='✗ Error: '+e.message;
  }
  btn.disabled=false; btn.textContent='Save Entry';
}

// ============================================================
// DELETE
// ============================================================
function confirmDelete(id, type) {
  const msgs = {
    entry:'Delete this tour entry? This cannot be undone.',
    tour:`Remove Tour "${id}"?`,
    station:`Remove station "${id}"?`,
    driver:`Remove driver "${id}"?`
  };
  document.getElementById('delMsg').textContent = msgs[type]||'Are you sure?';
  document.getElementById('delConfirmBtn').onclick = () => { doDelete(id,type); closeModal('delModal'); };
  document.getElementById('delModal').classList.add('open');
}

async function doDelete(id, type) {
  if (type==='entry') {
    await sb.from('entries').delete().eq('id',id);
    entries = entries.filter(e=>e.id!==id);
  } else if (type==='tour') {
    await sb.from('tours').delete().eq('name',id);
    await sb.from('tour_values').delete().eq('tour_name',id);
    tours = tours.filter(t=>t!==id);
    delete tourValues[id];
  } else if (type==='station') {
    await sb.from('stations').delete().eq('name',id);
    await sb.from('tour_values').delete().eq('station_name',id);
    stations = stations.filter(s=>s!==id);
    tours.forEach(t=>{ delete tourValues[t]?.[id]; });
  } else if (type==='driver') {
    await sb.from('drivers').delete().eq('name',id);
    drivers = drivers.filter(d=>d!==id);
  }
  // Refresh current page
  const nav = currentRole==='user' ? uPage : aPage;
  const fns = { entries: currentRole==='user'?renderUserEntries:renderAdminEntries, hours:renderHoursReport, tours:renderToursAdmin, stations:renderStationsAdmin, drivers:renderDriversAdmin, settings:renderSettingsAdmin };
  fns[nav]?.();
}

// ============================================================
// EXPORT EXCEL
// ============================================================
function exportExcel() {
  const month   = document.getElementById('rMonth')?.value || document.getElementById('filterMonth')?.value || '';
  const rDriver = document.getElementById('rDriver')?.value || '';
  const station = document.getElementById('rStation')?.value || document.getElementById('filterStation')?.value || '';

  let list = entries.filter(e => {
    if (month   && !e.date.startsWith(month)) return false;
    if (rDriver && e.driver!==rDriver) return false;
    if (station && e.station!==station) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const wb = XLSX.utils.book_new();

  // Entries sheet
  const rows = [['Date','Driver','Tour','Hours','Station']];
  list.forEach(e => rows.push([e.date, e.driver, 'Tour '+e.tour, getTourHours(e.tour,e.station), e.station]));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:22},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Entries');

  // Summary sheet
  const byDriver = {};
  list.forEach(e => {
    if (!byDriver[e.driver]) byDriver[e.driver] = { tours:{}, total:0 };
    byDriver[e.driver].tours[e.tour] = (byDriver[e.driver].tours[e.tour]||0)+1;
    byDriver[e.driver].total += getTourHours(e.tour,e.station);
  });
  const sumRows = [['Driver',...tours.map(t=>`Tour ${t} (count)`),'Total Hours']];
  Object.entries(byDriver).forEach(([name,data]) => {
    sumRows.push([name,...tours.map(t=>data.tours[t]||0),data.total]);
  });
  sumRows.push(['TOTAL',...tours.map(t=>Object.values(byDriver).reduce((a,d)=>a+(d.tours[t]||0),0)),Object.values(byDriver).reduce((a,d)=>a+d.total,0)]);
  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols'] = [{wch:22},...tours.map(()=>({wch:14})),{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  XLSX.writeFile(wb, `TourReport_${month||'All'}.xlsx`);
}

</script>
